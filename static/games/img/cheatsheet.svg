<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="deskbg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#3b2f21"/>
      <stop offset="100%" stop-color="#191309"/>
    </radialGradient>
    <linearGradient id="parch" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3e3bf"/>
      <stop offset="100%" stop-color="#e2cb98"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#deskbg)"/>
  <!-- parchment scroll -->
  <g transform="rotate(-3 200 200)">
    <rect x="72" y="58" width="256" height="290" fill="url(#parch)" stroke="#b49459" stroke-width="2"/>
    <!-- rolled top and bottom -->
    <rect x="64" y="46" width="272" height="26" rx="13" fill="#e8d3a4" stroke="#b49459" stroke-width="2"/>
    <rect x="64" y="336" width="272" height="26" rx="13" fill="#d9bf8b" stroke="#b49459" stroke-width="2"/>
    <!-- ornamental title -->
    <rect x="118" y="92" width="164" height="13" rx="6" fill="#7f1d1d" opacity="0.85"/>
    <path d="M100 120H300" stroke="#a8874f" stroke-width="2"/>
    <!-- timeline -->
    <path d="M140 140V320" stroke="#57534e" stroke-width="4"/>
    <g fill="#7f1d1d" stroke="#f3e3bf" stroke-width="3">
      <circle cx="140" cy="156" r="9"/>
      <circle cx="140" cy="204" r="9"/>
      <circle cx="140" cy="252" r="9"/>
      <circle cx="140" cy="300" r="9"/>
    </g>
    <!-- entry lines -->
    <g fill="#8b7355">
      <rect x="162" y="148" width="66" height="9" rx="4"/>
      <rect x="162" y="163" width="106" height="7" rx="3" opacity="0.6"/>
      <rect x="162" y="196" width="88" height="9" rx="4"/>
      <rect x="162" y="211" width="120" height="7" rx="3" opacity="0.6"/>
      <rect x="162" y="244" width="58" height="9" rx="4"/>
      <rect x="162" y="259" width="98" height="7" rx="3" opacity="0.6"/>
      <rect x="162" y="292" width="92" height="9" rx="4"/>
      <rect x="162" y="307" width="80" height="7" rx="3" opacity="0.6"/>
    </g>
  </g>
  <!-- quill -->
  <g transform="rotate(24 318 300)">
    <path d="M318 178C340 216 342 268 322 312C316 300 310 296 306 296C300 250 304 210 318 178Z" fill="#e7e5e4"/>
    <path d="M318 178C330 214 332 264 318 306" stroke="#a8a29e" stroke-width="3" fill="none"/>
    <path d="M322 312L316 338L308 314C312 308 318 308 322 312Z" fill="#44403c"/>
  </g>
  <!-- ink drop -->
  <circle cx="290" cy="352" r="7" fill="#1c1917"/>
</svg>
