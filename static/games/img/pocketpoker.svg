<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="felt" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="65%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#052e16"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#felt)"/>
  <ellipse cx="200" cy="200" rx="165" ry="150" fill="none" stroke="#facc15" stroke-width="3" opacity="0.35"/>
  <!-- two hole cards -->
  <g transform="translate(200,175)">
    <g transform="rotate(-12)">
      <rect x="-105" y="-75" width="110" height="150" rx="10" fill="#f8fafc" stroke="#94a3b8"/>
      <text x="-92" y="-42" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="#111827">A</text>
      <text x="-50" y="22" font-family="Georgia, serif" font-size="58" fill="#111827" text-anchor="middle">&#x2660;</text>
    </g>
    <g transform="rotate(11)">
      <rect x="-8" y="-72" width="110" height="150" rx="10" fill="#f8fafc" stroke="#94a3b8"/>
      <text x="4" y="-39" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="#dc2626">A</text>
      <text x="47" y="25" font-family="Georgia, serif" font-size="58" fill="#dc2626" text-anchor="middle">&#x2665;</text>
    </g>
  </g>
  <!-- chips -->
  <g>
    <circle cx="88" cy="322" r="30" fill="#dc2626" stroke="#fff" stroke-width="5" stroke-dasharray="12 10"/>
    <circle cx="88" cy="322" r="16" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
    <circle cx="318" cy="310" r="30" fill="#2563eb" stroke="#fff" stroke-width="5" stroke-dasharray="12 10"/>
    <circle cx="318" cy="310" r="16" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
    <circle cx="278" cy="345" r="30" fill="#111827" stroke="#facc15" stroke-width="5" stroke-dasharray="12 10"/>
    <circle cx="278" cy="345" r="16" fill="none" stroke="#facc15" stroke-width="2" opacity="0.7"/>
  </g>
</svg>
