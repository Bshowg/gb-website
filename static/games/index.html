<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludoteca</title>
    <link rel="stylesheet" href="../../style.css">
    <link href="../../output.css" rel="stylesheet"></link>
    <script defer src="../../scripts/main.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .game-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            padding: 1.5rem;
        }
        @media (min-width: 768px) {
            .game-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
        .game-tile {
            position: relative;
            display: block;
            aspect-ratio: 1 / 1;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
        .game-tile img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .game-tile:hover img {
            transform: scale(1.06);
        }
        .game-tile .game-title {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.25);
            color: #fff;
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
            transition: background 0.3s ease;
        }
        .game-tile:hover .game-title {
            background: rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="notebook">

    <!-- Include the new header component -->
    <div x-data x-init="$el.innerHTML = await (await fetch('../../components/header.html')).text().then(html => html.replace('{{ title }}', 'LUDOTECA').replace('{{ subtitle }}', 'Sperimentale'))"></div>

    <main class="max-w-4xl mx-auto py-8 text-center mb-5 bg-white">
        <div class="game-grid">
            <a href="./ribalta/index.html" class="game-tile" title="Gioco teatrale collaborativo per improvvisare e creare scene.">
                <img src="./img/ribalta.svg" alt="Ribalta">
                <h2 class="game-title">Ribalta</h2>
            </a>
            <a href="./iching/iching.html" class="game-tile" title="Divinazione cinese basata sul Libro dei Mutamenti.">
                <img src="./img/iking.svg" alt="I King">
                <h2 class="game-title">I King</h2>
            </a>
            <a href="./pocketpoker/index.html" class="game-tile" title="Texas Hold'em poker per 2 giocatori su 1 schermo.">
                <img src="./img/pocketpoker.svg" alt="Pocket Poker">
                <h2 class="game-title">Pocket Poker</h2>
            </a>
            <a href="./gameoflife/game-of-life.html" class="game-tile" title="Game of life implementato in three.js.">
                <img src="./img/gameoflife.svg" alt="Game of Life">
                <h2 class="game-title">Game of Life</h2>
            </a>
            <a href="/cheatsheet/index.html" class="game-tile" title="Riassunti e timeline di storia: guide di riferimento rapido.">
                <img src="./img/cheatsheet.svg" alt="Cheatsheet">
                <h2 class="game-title">Cheatsheet</h2>
            </a>
        </div>
    </main>
    
    <!-- Include the footer component -->
    <div x-data x-init="$el.innerHTML = await (await fetch('../../components/footer.html')).text()"></div>

</body>
</html>
