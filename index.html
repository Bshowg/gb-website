<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gbwebsite</title>
    <script>
        // Add CSS files with timestamp to prevent caching
        const timestamp = Date.now();
        document.write('<link rel="stylesheet" href="style.css?v=' + timestamp + '">');
        document.write('<link href="output.css?v=' + timestamp + '" rel="stylesheet">');
        document.write('<link rel="stylesheet" href="static/css/notes.css?v=' + timestamp + '">');
    </script>
    <noscript>
        <!-- Fallback for no JavaScript -->
        <link rel="stylesheet" href="style.css">
        <link href="output.css" rel="stylesheet">
        <link rel="stylesheet" href="static/css/notes.css">
    </noscript>
    <!-- the scripts have to be called before Alpine  http-server -p 8080 --spa-->
    <script defer src="scripts/router.js" ></script> <!-- Simple router script -->
    <script defer src="scripts/main.js" ></script> <!-- Main JavaScript for handling articles -->
    <script defer src="static/js/notes.js"></script> <!-- Note system for articles -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.10.2/dist/cdn.min.js"></script>
    <script src="scripts/d3.v7.min.js"></script>

</head>
<body class="notebook">

    <!-- Include the new header component -->
    <div x-data x-init="$el.innerHTML = await (await fetch('components/header.html')).text().then(html => html.replace('{{ title }}', 'ARTICOLI').replace('{{ subtitle }}', 'Pensieri e storie brevi'))"></div>
    
    <main class="mx-auto pb-8" id="app">
        <!-- Router Outlet -->
        <div x-data="routerOutlet"></div>
    </main>

    <!-- Include the footer component -->
    <div x-data x-init="$el.innerHTML = await (await fetch('components/footer.html')).text()"></div>

</body>
</html>
